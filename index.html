<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>memoria-sandbox</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08080d;
      --surface: rgba(20, 20, 30, 0.86);
      --border: rgba(160, 150, 220, 0.22);
      --text: #e6e2f0;
      --muted: #9a94ad;
      --accent: #85d8c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(80, 120, 150, 0.18), transparent 32rem),
        radial-gradient(circle at 80% 80%, rgba(100, 80, 150, 0.16), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(760px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.035);
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    a:hover,
    a:focus-visible {
      border-color: rgba(133, 216, 194, 0.7);
      background: rgba(133, 216, 194, 0.08);
      transform: translateY(-1px);
      outline: none;
    }

    .title {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
      font-size: 1.05rem;
      letter-spacing: 0.08em;
    }

    .desc {
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>memoria-sandbox</h1>
    <p>検証用ページを置くための汎用サンドボックスです。</p>

    <a href="./reverb-map/">
      <span class="title">reverb-map</span>
      <span class="desc">Three.jsによる還響域マップ表示サンプル</span>
    </a>
  </main>
</body>
</html>
